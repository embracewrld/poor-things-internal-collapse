<svg viewBox="0 0 1120 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c84a6"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c6fd0"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1120" height="420" rx="18" fill="#0f0f16"/>

  <!-- title -->
  <text x="40" y="46" fill="#f4f4f6" font-size="22" font-weight="700">Poor Things: Internal Collapse</text>
  <text x="40" y="68" fill="#9aa0b0" font-size="13" letter-spacing="0.5">Real-time data flow &#183; camera &#8594; vision &#8594; OSC &#8594; sound + image</text>

  <!-- ===== connectors (drawn first, under nodes) ===== -->
  <!-- vision spine -->
  <line x1="170" y1="210" x2="198" y2="210" stroke="#7c84a6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="210" x2="388" y2="210" stroke="#7c84a6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="210" x2="588" y2="210" stroke="#7c84a6" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- OSC split: up to TouchDesigner -->
  <path d="M700,196 C726,170 720,120 738,120" fill="none" stroke="#8c6fd0" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <!-- OSC split: down to SuperCollider -->
  <path d="M700,224 C726,250 720,300 738,300" fill="none" stroke="#8c6fd0" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <!-- outputs -->
  <line x1="920" y1="120" x2="958" y2="120" stroke="#7c84a6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="300" x2="958" y2="300" stroke="#7c84a6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- port labels on the split -->
  <text x="712" y="150" fill="#cbb9f2" font-size="11" font-weight="600">UDP :7000 *</text>
  <text x="712" y="278" fill="#cbb9f2" font-size="11" font-weight="600">UDP :57120</text>

  <!-- ===== vision nodes ===== -->
  <g>
    <rect x="40" y="178" width="130" height="64" rx="12" fill="#1b2230" stroke="#3a4760" stroke-width="1.5"/>
    <text x="105" y="206" fill="#cdd6e6" font-size="14" font-weight="600" text-anchor="middle">Camera</text>
    <text x="105" y="225" fill="#8590a8" font-size="11" text-anchor="middle">webcam / capture</text>
  </g>
  <g>
    <rect x="200" y="178" width="160" height="64" rx="12" fill="#1b2230" stroke="#3a4760" stroke-width="1.5"/>
    <text x="280" y="206" fill="#cdd6e6" font-size="14" font-weight="600" text-anchor="middle">MediaPipe Pose</text>
    <text x="280" y="225" fill="#8590a8" font-size="11" text-anchor="middle">Python</text>
  </g>
  <g>
    <rect x="390" y="178" width="170" height="64" rx="12" fill="#1b2230" stroke="#3a4760" stroke-width="1.5"/>
    <text x="475" y="206" fill="#cdd6e6" font-size="14" font-weight="600" text-anchor="middle">Feature extraction</text>
    <text x="475" y="225" fill="#8590a8" font-size="11" text-anchor="middle">position &#183; velocity &#183; stillness</text>
  </g>

  <!-- ===== OSC hub ===== -->
  <g>
    <rect x="590" y="182" width="110" height="56" rx="28" fill="#2a2140" stroke="#6b4fa0" stroke-width="1.6"/>
    <text x="645" y="208" fill="#e3d8ff" font-size="15" font-weight="700" text-anchor="middle">OSC</text>
    <text x="645" y="225" fill="#a99cd0" font-size="10.5" text-anchor="middle">Open Sound Control</text>
  </g>

  <!-- ===== visual branch ===== -->
  <g>
    <rect x="740" y="88" width="180" height="64" rx="12" fill="#16241d" stroke="#2f6b4f" stroke-width="1.5"/>
    <text x="830" y="116" fill="#cfeede" font-size="14" font-weight="600" text-anchor="middle">TouchDesigner</text>
    <text x="830" y="135" fill="#7fae96" font-size="11" text-anchor="middle">visuals &#183; OSC In CHOP</text>
  </g>
  <g>
    <rect x="960" y="88" width="140" height="64" rx="12" fill="#13201a" stroke="#27513d" stroke-width="1.5"/>
    <text x="1030" y="116" fill="#bfe0cf" font-size="13" font-weight="600" text-anchor="middle">Projection</text>
    <text x="1030" y="135" fill="#6f9c84" font-size="11" text-anchor="middle">display</text>
  </g>

  <!-- ===== sound branch ===== -->
  <g>
    <rect x="740" y="268" width="180" height="64" rx="12" fill="#241d14" stroke="#7a5a2f" stroke-width="1.5"/>
    <text x="830" y="296" fill="#f0e0c0" font-size="14" font-weight="600" text-anchor="middle">SuperCollider</text>
    <text x="830" y="315" fill="#bd9b66" font-size="11" text-anchor="middle">5 SynthDef modules &#183; OSCdef</text>
  </g>
  <g>
    <rect x="960" y="268" width="140" height="64" rx="12" fill="#201a12" stroke="#5e4525" stroke-width="1.5"/>
    <text x="1030" y="296" fill="#e7d4ab" font-size="13" font-weight="600" text-anchor="middle">Multichannel</text>
    <text x="1030" y="315" fill="#a8884f" font-size="11" text-anchor="middle">audio</text>
  </g>

  <!-- footnote -->
  <text x="40" y="398" fill="#6c727f" font-size="11">* TouchDesigner port is a placeholder &#8212; confirm in docs/osc-map.md</text>
</svg>
